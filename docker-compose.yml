version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/carrotcontext.db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-secret-key}
      - KNOWLEDGE_BASE_PATH=./data/knowledge
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000","http://localhost"]
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
